<header class="header">
  <!-- RIGHT: logo + divider + title (first in DOM = right in RTL) -->
  <div class="header-right">
    <!-- Logo — rightmost in RTL (first in DOM) -->
    <div class="logo-block">
      <span class="logo"><span class="logo-dot">●</span> stack</span>
    </div>

    <div class="header-divider"></div>

    <!-- Title — left of divider -->
    <div class="title-block">
      <h1 class="board-title">לוח</h1>
      <p class="board-subtitle">{{ taskCount }} משימות ב-3 עמודות</p>
    </div>
  </div>

  <!-- LEFT: avatar + new task (last in DOM = left in RTL) -->
  <div class="header-left">
    <button class="btn-new-task" (click)="addTask.emit()">+ משימה חדשה</button>
    <div class="avatar" aria-hidden="true">{{ userInitials }}</div>
    <button class="btn-logout" (click)="logout()" aria-label="התנתק">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: scaleX(-1)">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>
