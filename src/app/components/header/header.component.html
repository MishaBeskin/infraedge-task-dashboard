<header class="header">
  <!-- RIGHT: logo + divider + title (first in DOM = right in RTL) -->
  <div class="header-right">
    <!-- Logo — rightmost in RTL (first in DOM) -->
    <div class="logo-block">
      <span class="logo"><span class="logo-dot">●</span> stack</span>
    </div>

    <div class="header-divider"></div>

    <!-- Title — left of divider -->
    <div class="title-block">
      <h1 class="board-title">לוח</h1>
      <p class="board-subtitle">{{ taskCount }} משימות ב-3 עמודות</p>
    </div>
  </div>

  <!-- LEFT: avatar + new task (last in DOM = left in RTL) -->
  <div class="header-left">
    <button class="btn-new-task" (click)="addTask.emit()">+ משימה חדשה</button>
    <div class="avatar" aria-hidden="true">{{ userInitials }}</div>
    <button
      class="btn-theme"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.isDark() ? 'עבור למצב בהיר' : 'עבור למצב כהה'"
    >
      @if (themeService.isDark()) {
        <!-- sun -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <!-- moon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
    <button class="btn-logout" (click)="logout()" aria-label="התנתק">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: scaleX(-1)">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>
