<div class="task-card"
     [class.is-updating]="isUpdating()"
     [class.is-dragging]="isDragging()"
     [attr.data-priority]="task.priority"
     draggable="true"
     (dragstart)="onDragStart($event)"
     (dragend)="onDragEnd()">
  <div class="card-body">
    <div class="card-title-row">
      <p class="card-title">{{ task.title }}</p>
      <button class="edit-btn" (click)="editTask.emit(task)" aria-label="ערוך משימה">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
    @if (task.description) {
      <p class="card-description">{{ task.description }}</p>
    }
    <span class="priority-badge" [attr.data-priority]="task.priority">
      <span class="badge-dot"></span>{{ priorityLabel }}
    </span>
  </div>

  <div class="card-divider"></div>

  <div class="card-footer">
    <!-- Status select — RIGHT in RTL (first in DOM) -->
    <div class="status-select-wrapper" [attr.data-status]="task.status">
      <span class="status-dot"></span>
      <select (change)="onStatusChange($event)" [disabled]="isUpdating()">
        <option value="todo" [selected]="task.status === 'todo'">לעשות</option>
        <option value="in-progress" [selected]="task.status === 'in-progress'">בתהליך</option>
        <option value="done" [selected]="task.status === 'done'">הושלם</option>
      </select>
    </div>

    <!-- Delete — LEFT in RTL (last in DOM) -->
    @if (showDeleteConfirm()) {
      <button class="delete-btn delete-btn--confirm" (click)="onDeleteClick()">
        <span>למחוק?</span>
        <svg class="countdown-ring" width="18" height="18" viewBox="0 0 18 18">
          <circle class="ring-track" cx="9" cy="9" r="7"/>
          <circle class="ring-fill" cx="9" cy="9" r="7"/>
        </svg>
      </button>
    } @else {
      <button class="delete-btn" (click)="onDeleteClick()" aria-label="מחק משימה">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    }
  </div>
</div>
